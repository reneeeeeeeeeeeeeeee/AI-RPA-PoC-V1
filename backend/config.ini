# ERP-Assistent Konfiguration
# Diese Datei anpassen bevor du startest

[erp]
# URL deiner ERP-Installation
url = http://localhost/erp/
# oder z.B.: http://192.168.1.100/erp

# ERP-Login (wird für automatischen Login genutzt)
username = admin
password = 123456789

[models]
# Pfad zum LLM (Gemma)
llm_path = llm

# Pfad zu CogAgent
cogagent_path = ui

# GPU-Speicher in GB – bei weniger als 60 GB wird 4-bit Quantisierung aktiviert
# Trage hier deine GPU-Kapazität ein (z.B. 24 für RTX 3090)
gpu_vram_gb = 24

[server]
host = 0.0.0.0
port = 8000

[paths]
uploads = uploads
jobs    = jobs
